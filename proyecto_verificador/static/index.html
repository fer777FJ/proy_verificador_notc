<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerificaBolivia AI | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body class="bg-zinc-950 text-gray-200 selection:bg-orange-500 selection:text-white">

    <nav class="bg-black p-4 text-white shadow-2xl border-b border-orange-600/50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter uppercase">
                <i class="fas fa-bolt mr-2 text-orange-500"></i>Verifica<span class="text-orange-500">Bolivia</span>
            </h1>
            <span
                class="text-[10px] font-mono text-orange-400 border border-orange-400/30 px-2 py-1 rounded">SISTEMAS_V3.0</span>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4 max-w-3xl">
        <div class="flex mb-6 bg-zinc-900 rounded-xl p-1 border border-zinc-800">
            <button onclick="switchTab('texto')" id="tab-texto"
                class="flex-1 py-3 px-4 rounded-lg tab-active transition-all duration-300 font-bold uppercase text-xs tracking-widest">Texto</button>
            <button onclick="switchTab('link')" id="tab-link"
                class="flex-1 py-3 px-4 rounded-lg transition-all duration-300 font-bold uppercase text-xs tracking-widest text-zinc-500 hover:text-orange-400">Enlace</button>
            <button onclick="switchTab('imagen')" id="tab-imagen"
                class="flex-1 py-3 px-4 rounded-lg transition-all duration-300 font-bold uppercase text-xs tracking-widest text-zinc-500 hover:text-orange-400">Imagen</button>
        </div>

        <div class="bg-zinc-900 p-8 rounded-2xl shadow-2xl border border-zinc-800 relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-orange-600/10 blur-3xl rounded-full"></div>

            <div id="sec-texto" class="space-y-4 relative z-10">
                <input id="titular" type="text" placeholder="TITULAR DE LA NOTICIA"
                    class="w-full p-4 bg-black border border-zinc-700 rounded-xl focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all placeholder:text-zinc-600 text-orange-50">
                <textarea id="contenido" rows="5" placeholder="CUERPO DEL ARTÍCULO O POST..."
                    class="w-full p-4 bg-black border border-zinc-700 rounded-xl focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all placeholder:text-zinc-600 text-orange-50"></textarea>
                <button onclick="verificarTexto()"
                    class="w-full bg-orange-600 hover:bg-orange-500 text-black font-black p-4 rounded-xl transition-all transform hover:scale-[1.01] active:scale-95">
                    EJECUTAR ANÁLISIS
                </button>
            </div>

            <div id="sec-link" class="hidden space-y-4 relative z-10">
                <input id="url-input" type="text" placeholder="https://url-de-la-noticia.com"
                    class="w-full p-4 bg-black border border-zinc-700 rounded-xl focus:border-orange-500 focus:ring-1 focus:ring-orange-500 outline-none transition-all text-orange-50">
                <button onclick="verificarLink()"
                    class="w-full bg-orange-600 hover:bg-orange-500 text-black font-black p-4 rounded-xl transition-all transform hover:scale-[1.01]">
                    RASTREAR ENLACE
                </button>
            </div>

            <div id="sec-imagen" class="hidden space-y-6 text-center relative z-10">
                <div class="border-2 border-dashed border-zinc-700 p-12 rounded-2xl cursor-pointer hover:border-orange-500/50 bg-black/50 transition-all group"
                    onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-鋪 text-4xl text-zinc-600 group-hover:text-orange-500 mb-4 transition-colors"></i>
                    <p id="file-label" class="text-zinc-500 font-medium">ARRASTRA O SUBE EVIDENCIA VISUAL</p>
                    <input id="file-input" type="file" class="hidden" onchange="updateFileName()">
                </div>
                <button onclick="verificarImagen()"
                    class="w-full bg-orange-600 hover:bg-orange-500 text-black font-black p-4 rounded-xl transition-all">
                    ESCÁNER FORENSE
                </button>
            </div>
        </div>

        <div id="loading" class="hidden mt-10 text-center animate-pulse">
            <div class="flex justify-center space-x-2 mb-2">
                <div class="w-2 h-2 bg-orange-500 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-orange-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                <div class="w-2 h-2 bg-orange-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
            </div>
            <p class="text-orange-500 font-mono text-xs tracking-tighter uppercase">Conectando con Redes Neuronales...
            </p>
        </div>

        <div id="resultado"
            class="hidden mt-10 p-8 rounded-2xl bg-zinc-900 border-l-[12px] shadow-[0_0_50px_-12px_rgba(234,88,12,0.3)] animate-fade-in border-orange-600">
            <h3 id="res-veredicto" class="text-2xl font-black mb-3 italic uppercase tracking-tight"></h3>
            <div class="h-px bg-zinc-800 w-full mb-4"></div>
            <p id="res-analisis" class="text-zinc-400 leading-relaxed font-medium"></p>
            <p id="res-confianza" class="mt-3 text-sm font-bold text-orange-400"></p>
            <div id="res-fuentes"
                class="mt-6 pt-4 border-t border-zinc-800 text-[10px] font-mono text-orange-400/80 uppercase"></div>
        </div>
        <div class="flex items-center space-x-3 mb-6">
            <div class="h-8 w-1 bg-orange-500 rounded-full"></div>
            <h2 class="text-xl font-bold text-white tracking-tight uppercase">Historial de Verificaciones</h2>
        </div>

        <div id="historial-lista" class="space-y-4">
            <div class="text-zinc-500 text-sm animate-pulse">Consultando base de datos de VerificaBolivia...</div>
        </div>
    </main>
    <script src="/static/script.js"></script>
</body>

</html>
